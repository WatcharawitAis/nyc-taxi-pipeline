bundle:
  name: nyc-taxi

include:
  - resources/*.yml

variables:
  catalog:
    default: biap
  schema:
    default: default
  warehouse_id:
    lookup:
      warehouse: 'Serverless Starter Warehouse'
  pipeline_development:
    default: true

targets:
  dev:
    default: true
    mode: development
    variables:
      catalog: biap
      schema: dev
      pipeline_development: true
    
  staging:
    mode: development
    variables:
      catalog: biap
      schema: staging
      pipeline_development: false
  
  prod:
    mode: production
    variables:
      catalog: biap
      schema: prod
      pipeline_development: false
