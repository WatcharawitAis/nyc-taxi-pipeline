bundle:
  name: nyc-taxi

# Variables สำหรับใช้ใน resource files
variables:
  catalog:
    description: Unity Catalog name
    default: main
  
  bronze_schema:
    description: Bronze layer schema
    default: bronze
  
  silver_schema:
    description: Silver layer schema
    default: silver
  
  gold_schema:
    description: Gold layer schema
    default: gold
  
  warehouse_id:
    description: SQL Warehouse ID for jobs
    default: ""
  
  pipeline_development:
    description: Enable development mode for pipeline
    default: true

# Include resource files
include:
  - resources/*.yml

# Development target (default)
targets:
  dev:
    default: true
    mode: development
    
    variables:
      catalog: biap_dev
      bronze_schema: bronze
      silver_schema: silver
      gold_schema: gold
      pipeline_development: true
  
  # Staging target
  staging:
    mode: development
    
    variables:
      catalog: biap_staging
      bronze_schema: bronze
      silver_schema: silver
      gold_schema: gold
      pipeline_development: true
  
  # Production target
  prod:
    mode: production
    
    workspace:
      root_path: /Workspace/Users/${workspace.current_user.userName}/.bundle/${bundle.name}/${bundle.target}
    
    variables:
      catalog: biap_prod
      bronze_schema: bronze
      silver_schema: silver
      gold_schema: gold
      pipeline_development: false
