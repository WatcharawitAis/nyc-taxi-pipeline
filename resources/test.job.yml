resources:
  jobs:
    test:
      name: NYC Taxi Tests - ${bundle.target}
      environments:
        - environment_key: test_env
          spec:
            environment_version: '5'
            dependencies:
              - pytest
      tasks:
        - task_key: run_tests
          environment_key: test_env  
          spark_python_task:
            python_file: ../run_test.py
            source: WORKSPACE