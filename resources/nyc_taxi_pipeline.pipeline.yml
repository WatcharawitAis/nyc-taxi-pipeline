resources:
  pipelines:
    nyc_taxi_pipeline:
      name: NYC Taxi Data Pipeline - ${bundle.target}
      
      # Unity Catalog configuration
      catalog: ${var.catalog}
      target: ${var.bronze_schema}  # Default output schema is bronze
      
      # Configuration parameters accessible in pipeline code via spark.conf
      configuration:
        bronze_schema: ${var.bronze_schema}
        silver_schema: ${var.silver_schema}
        gold_schema: ${var.gold_schema}
      
      # Pipeline source code using glob pattern
      libraries:
        - glob:
            include: ../src/pipeline/**/*.py
      
      # Root path for pipeline code
      root_path: ../src/pipeline
      
      # Compute configuration
      serverless: true
      photon: true
      channel: current
      
      # Pipeline mode
      continuous: false
      development: ${var.pipeline_development}
      
      # Notifications (optional)
      notifications:
        - alerts:
            - on_update_failure
            - on_update_fatal_failure
          email_recipients:
            - watchaaq@ais.co.th
      
      # Permissions
      permissions:
        - level: CAN_VIEW
          group_name: users
        - level: CAN_RUN
          group_name: data_engineers
