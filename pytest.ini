[pytest]
# Pytest configuration for NYC Taxi Pipeline tests

# Test discovery patterns
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Test paths - organized by type
testpaths = tests

# Add src directory to Python path for imports
pythonpath = .

# Output options
addopts = 
    -v
    --tb=short
    --strict-markers
    --color=yes
    -ra

# Markers for test categorization
markers =
    unit: Unit tests - test individual functions in isolation (fast, no external dependencies)
    integration: Integration tests - test end-to-end flows (requires Databricks cluster)
    slow: Tests that take significant time to run
    bronze: Tests related to bronze layer
    silver: Tests related to silver layer
    gold: Tests related to gold layer
    data_quality: Tests that verify data quality rules

# Log configuration
log_cli = true
log_cli_level = INFO
log_cli_format = %(asctime)s [%(levelname)8s] %(message)s
log_cli_date_format = %Y-%m-%d %H:%M:%S

# Warning filters
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning
